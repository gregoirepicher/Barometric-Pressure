<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Barometric Pressure Tracker</title>

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BP Tracker">
    <link rel="apple-touch-icon" href="/static/icon.svg">
    <link rel="icon" type="image/svg+xml" href="/static/icon.svg">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ui-scale: 1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            font-size: calc(16px * var(--ui-scale));
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            padding-top: calc(24px + env(safe-area-inset-top));
            padding-bottom: calc(24px + env(safe-area-inset-bottom));
            padding-left: calc(24px + env(safe-area-inset-left));
            padding-right: calc(24px + env(safe-area-inset-right));
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        /* City Search */
        .city-search {
            position: relative;
            max-width: 420px;
            margin: 0 auto 28px;
        }

        .city-search input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #334155;
            border-radius: 12px;
            background: #1e293b;
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .city-search input:focus {
            border-color: #6366f1;
        }

        .city-search .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1e293b;
            border: 2px solid #334155;
            border-top: none;
            border-radius: 0 0 12px 12px;
            max-height: 260px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .city-search .dropdown.open {
            display: block;
        }

        .city-search .dropdown-item {
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid #334155;
            transition: background 0.15s;
        }

        .city-search .dropdown-item:hover {
            background: #334155;
        }

        .city-search .dropdown-item .city-name {
            font-weight: 600;
            color: #f8fafc;
        }

        .city-search .dropdown-item .city-detail {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        /* Range Controls */
        .controls {
            display: flex;
            gap: 32px;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .range-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .range-group label {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .range-group .range-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .range-group input[type="range"] {
            width: 180px;
            accent-color: #6366f1;
        }

        .range-group .range-value {
            font-size: 1rem;
            font-weight: 700;
            color: #c7d2fe;
            min-width: 60px;
            text-align: center;
        }

        /* Chart */
        .chart-wrapper {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #334155;
            position: relative;
        }

        .chart-wrapper canvas {
            width: 100% !important;
            touch-action: none;   /* Prevent browser pinch-zoom on the chart */
        }

        /* Status indicators */
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .status-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 16px 24px;
            text-align: center;
            min-width: 160px;
        }

        .status-card .label {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .status-card .value {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .status-card .value.drop { color: #ef4444; }
        .status-card .value.rise { color: #34d399; }
        .status-card .value.neutral { color: #c7d2fe; }

        .status-card .detail {
            font-size: 0.78rem;
            color: #64748b;
            margin-top: 2px;
        }

        /* Alert banner */
        .alert-banner {
            text-align: center;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 0.95rem;
            display: none;
        }

        .alert-banner.warning {
            display: block;
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid rgba(220, 38, 38, 0.35);
            color: #fca5a5;
        }

        .alert-banner.ok {
            display: block;
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.2);
            color: #6ee7b7;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .chart-hint {
            text-align: center;
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 12px;
        }

        /* Data loading status */
        .data-status {
            text-align: center;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 0.85rem;
        }

        .data-status.loading {
            background: rgba(99, 102, 241, 0.12);
            border: 1px solid rgba(99, 102, 241, 0.25);
            color: #a5b4fc;
        }

        .data-status.error {
            background: rgba(220, 38, 38, 0.12);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #fca5a5;
        }

        .data-status.stale {
            background: rgba(251, 191, 36, 0.12);
            border: 1px solid rgba(251, 191, 36, 0.25);
            color: #fde68a;
        }

        /* Chart legend */
        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            color: #94a3b8;
        }

        .legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            display: inline-block;
        }

        .legend-dash {
            width: 18px;
            height: 0;
            border-top: 2px dashed #fbbf24;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Barometric Pressure Tracker</h1>
            <p>Monitor pressure changes that may trigger migraines</p>
        </header>

        <div class="city-search">
            <input type="text" id="cityInput" placeholder="Search city... (default: Toronto)" autocomplete="off">
            <div class="dropdown" id="cityDropdown"></div>
        </div>

        <div id="alertBanner" class="alert-banner"></div>

        <div class="controls">
            <div class="range-group">
                <label>Text Size</label>
                <div class="range-row">
                    <input type="range" id="textScale" min="80" max="160" value="100" step="10">
                    <span class="range-value" id="textScaleValue">100%</span>
                </div>
            </div>
        </div>
        <p class="chart-hint">Pinch to zoom &bull; Drag to pan &bull; Double-tap to reset</p>

        <div id="dataStatus" class="data-status" style="display:none;"></div>

        <div class="chart-wrapper">
            <canvas id="pressureChart" height="400"></canvas>
        </div>
        <div class="chart-legend">
            <span class="legend-item"><span class="legend-swatch" style="background:#34d399"></span> Stable / Rising</span>
            <span class="legend-item"><span class="legend-swatch" style="background:#fb923c"></span> Moderate Drop</span>
            <span class="legend-item"><span class="legend-swatch" style="background:#dc2626"></span> Significant Drop</span>
            <span class="legend-item"><span class="legend-dash"></span> Now</span>
        </div>

        <div class="status-bar" id="statusBar">
            <div class="status-card">
                <div class="label">Current Pressure</div>
                <div class="value neutral" id="currentPressure">--</div>
                <div class="detail">hPa</div>
            </div>
            <div class="status-card">
                <div class="label">24h Change</div>
                <div class="value neutral" id="change24h">--</div>
                <div class="detail">hPa</div>
            </div>
            <div class="status-card">
                <div class="label">Max Drop (24h ahead)</div>
                <div class="value neutral" id="maxDrop">--</div>
                <div class="detail">hPa</div>
            </div>
            <div class="status-card">
                <div class="label">Trend</div>
                <div class="value neutral" id="trend">--</div>
                <div class="detail" id="trendDetail"></div>
            </div>
        </div>
    </div>

    <script>
        const cityInput = document.getElementById('cityInput');
        const cityDropdown = document.getElementById('cityDropdown');
        const alertBanner = document.getElementById('alertBanner');

        const textScaleSlider = document.getElementById('textScale');
        const textScaleValue = document.getElementById('textScaleValue');

        // Always load full range; zoom/pan controls what's visible
        const DAYS_BACK = 10;
        const DAYS_FORWARD = 10;
        const DEFAULT_VIEW_DAYS_BACK = 3;
        const DEFAULT_VIEW_DAYS_FORWARD = 3;

        let currentCity = { name: 'Toronto', lat: 43.6532, lon: -79.3832 };
        let chart = null;
        let searchTimeout = null;
        let lastLoadedData = null;  // Keep reference for text size re-render

        // --- Text Size ---
        textScaleSlider.addEventListener('input', () => {
            const pct = textScaleSlider.value;
            textScaleValue.textContent = `${pct}%`;
            document.documentElement.style.setProperty('--ui-scale', pct / 100);
            if (lastLoadedData) {
                if (chart) { chart.destroy(); chart = null; }
                renderChart(lastLoadedData);
            }
        });

        // --- City Search ---
        cityInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            const query = cityInput.value.trim();
            if (query.length < 2) {
                cityDropdown.classList.remove('open');
                return;
            }
            searchTimeout = setTimeout(() => searchCity(query), 300);
        });

        cityInput.addEventListener('blur', () => {
            setTimeout(() => cityDropdown.classList.remove('open'), 200);
        });

        async function searchCity(query) {
            const resp = await fetch(`/api/geocode?name=${encodeURIComponent(query)}`);
            const data = await resp.json();
            cityDropdown.innerHTML = '';

            if (data.results.length === 0) {
                cityDropdown.classList.remove('open');
                return;
            }

            data.results.forEach(r => {
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.innerHTML = `
                    <div class="city-name">${r.name}</div>
                    <div class="city-detail">${[r.admin1, r.country].filter(Boolean).join(', ')}</div>
                `;
                div.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    currentCity = { name: r.name, lat: r.latitude, lon: r.longitude };
                    cityInput.value = `${r.name}, ${[r.admin1, r.country].filter(Boolean).join(', ')}`;
                    cityDropdown.classList.remove('open');
                    loadData();
                });
                cityDropdown.appendChild(div);
            });
            cityDropdown.classList.add('open');
        }

        // --- localStorage cache ---
        function localCacheKey() {
            return `bp_${currentCity.lat}_${currentCity.lon}_full`;
        }

        function saveToLocal(data) {
            try {
                const entry = { data, ts: Date.now() };
                localStorage.setItem(localCacheKey(), JSON.stringify(entry));
                localStorage.setItem('bp_last_city', JSON.stringify(currentCity));
            } catch (e) { /* storage full, ignore */ }
        }

        function loadFromLocal() {
            try {
                const raw = localStorage.getItem(localCacheKey());
                if (!raw) return null;
                const entry = JSON.parse(raw);
                // Accept cache up to 2 hours old
                if (Date.now() - entry.ts > 2 * 60 * 60 * 1000) return null;
                return entry;
            } catch (e) { return null; }
        }

        const dataStatus = document.getElementById('dataStatus');

        function showStatus(type, message) {
            dataStatus.className = `data-status ${type}`;
            dataStatus.textContent = message;
            dataStatus.style.display = 'block';
        }

        function hideStatus() {
            dataStatus.style.display = 'none';
        }

        // --- Chart ---
        async function loadData() {
            const params = new URLSearchParams({
                lat: currentCity.lat,
                lon: currentCity.lon,
                days_back: DAYS_BACK,
                days_forward: DAYS_FORWARD,
            });

            showStatus('loading', 'Loading pressure data...');

            // Retry up to 3 times with backoff
            let lastError = null;
            for (let attempt = 0; attempt < 3; attempt++) {
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 15000);
                    const resp = await fetch(`/api/pressure?${params}`, { signal: controller.signal });
                    clearTimeout(timeout);

                    if (!resp.ok) {
                        throw new Error(`Server returned ${resp.status}`);
                    }

                    const data = await resp.json();

                    if (data.error) {
                        throw new Error(data.error);
                    }

                    lastLoadedData = data;
                    renderChart(data);
                    updateStatus(data);
                    saveToLocal(data);
                    hideStatus();
                    return;
                } catch (err) {
                    lastError = err;
                    console.warn(`Load attempt ${attempt + 1} failed:`, err.message);
                    if (attempt < 2) {
                        await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
                    }
                }
            }

            // All retries failed — try localStorage
            console.error('All attempts failed:', lastError);
            const cached = loadFromLocal();
            if (cached) {
                const ageMin = Math.round((Date.now() - cached.ts) / 60000);
                showStatus('stale', `Showing cached data from ${ageMin} min ago — live data temporarily unavailable`);
                renderChart(cached.data);
                updateStatus(cached.data);
            } else {
                showStatus('error', 'Unable to load pressure data. Will retry automatically...');
                // Auto-retry after 30 seconds
                setTimeout(loadData, 30000);
            }
        }

        // Classify pressure change rate over a rolling window (3h)
        // Returns 'good', 'moderate', or 'bad' for each data point
        function classifyPressure(pressures) {
            const ratings = new Array(pressures.length).fill('good');
            // Use a 3-hour rolling window to smooth out noise
            const window = 3;
            for (let i = window; i < pressures.length; i++) {
                if (pressures[i] === null || pressures[i - window] === null) continue;
                const change = pressures[i] - pressures[i - window];
                const ratePerHour = change / window;
                if (ratePerHour < -0.8) {
                    ratings[i] = 'bad';       // Significant drop
                } else if (ratePerHour < -0.3) {
                    ratings[i] = 'moderate';   // Moderate drop
                }
            }
            return ratings;
        }

        const COLOR_GOOD     = { line: '#34d399', fill: 'rgba(52, 211, 153, 0.18)' };
        const COLOR_MODERATE  = { line: '#fb923c', fill: 'rgba(251, 146, 60, 0.18)' };
        const COLOR_BAD       = { line: '#dc2626', fill: 'rgba(220, 38, 38, 0.28)' };

        function getScaledFont(basePx) {
            return Math.round(basePx * (parseInt(textScaleSlider.value) / 100));
        }

        function getSegmentColor(ratings) {
            return function(ctx) {
                const idx = ctx.p1DataIndex;
                const r = ratings[idx];
                if (r === 'bad') return COLOR_BAD.line;
                if (r === 'moderate') return COLOR_MODERATE.line;
                return COLOR_GOOD.line;
            };
        }

        function renderChart(data) {
            const ctx = document.getElementById('pressureChart').getContext('2d');
            const times = data.times.map(t => new Date(t));
            const pressures = data.pressures;
            const now = new Date();
            const ratings = classifyPressure(pressures);

            // Build per-point fill colors for the area under the line
            const fillColors = ratings.map(r => {
                if (r === 'bad') return COLOR_BAD.fill;
                if (r === 'moderate') return COLOR_MODERATE.fill;
                return COLOR_GOOD.fill;
            });

            // --- Plugins ---

            // Alternating day bands — background shading drawn early
            const dayBandsBgPlugin = {
                id: 'dayBandsBg',
                beforeDraw(chart) {
                    const { ctx, chartArea, scales } = chart;
                    const xScale = scales.x;
                    const firstTime = new Date(times[0]);
                    const lastTime = new Date(times[times.length - 1]);

                    const dayStart = new Date(firstTime);
                    dayStart.setHours(0, 0, 0, 0);

                    let day = new Date(dayStart);
                    let dayIndex = 0;

                    ctx.save();
                    while (day < lastTime) {
                        const nextDay = new Date(day);
                        nextDay.setDate(nextDay.getDate() + 1);

                        const x1 = Math.max(xScale.getPixelForValue(day), chartArea.left);
                        const x2 = Math.min(xScale.getPixelForValue(nextDay), chartArea.right);

                        if (x2 > chartArea.left && x1 < chartArea.right) {
                            ctx.fillStyle = dayIndex % 2 === 0
                                ? 'rgba(148, 163, 184, 0.04)'
                                : 'rgba(148, 163, 184, 0.09)';
                            ctx.fillRect(x1, chartArea.top, x2 - x1, chartArea.bottom - chartArea.top);
                        }

                        day = nextDay;
                        dayIndex++;
                    }
                    ctx.restore();
                }
            };

            // Day labels drawn LAST (afterDraw) so they're always on top
            const dayLabelsPlugin = {
                id: 'dayLabels',
                afterDraw(chart) {
                    const { ctx, chartArea, scales } = chart;
                    const xScale = scales.x;
                    const firstTime = new Date(times[0]);
                    const lastTime = new Date(times[times.length - 1]);

                    const dayStart = new Date(firstTime);
                    dayStart.setHours(0, 0, 0, 0);

                    let day = new Date(dayStart);
                    let dayIndex = 0;
                    const fs = getScaledFont(13);

                    ctx.save();
                    while (day < lastTime) {
                        const nextDay = new Date(day);
                        nextDay.setDate(nextDay.getDate() + 1);

                        const x1 = Math.max(xScale.getPixelForValue(day), chartArea.left);
                        const x2 = Math.min(xScale.getPixelForValue(nextDay), chartArea.right);

                        if (x2 > chartArea.left && x1 < chartArea.right && x2 - x1 > 30) {
                            const labelX = (x1 + x2) / 2;
                            const datePart = day.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                            ctx.textAlign = 'center';

                            // Semi-transparent background pill for readability
                            ctx.font = `bold ${fs}px -apple-system, sans-serif`;
                            const pillW = ctx.measureText(datePart).width + 20;
                            const pillH = fs + 10;
                            const pillX = labelX - pillW / 2;
                            const pillY = chartArea.top + 4;
                            ctx.fillStyle = 'rgba(15, 23, 42, 0.7)';
                            ctx.beginPath();
                            ctx.roundRect(pillX, pillY, pillW, pillH, 6);
                            ctx.fill();

                            // Date (e.g. "Mar 29")
                            ctx.fillStyle = '#cbd5e1';
                            ctx.fillText(datePart, labelX, pillY + fs + 2);
                        }

                        day = nextDay;
                        dayIndex++;
                    }
                    ctx.restore();
                }
            };

            // "Now" vertical line
            const nowLinePlugin = {
                id: 'nowLine',
                afterDraw(chart) {
                    const { ctx, chartArea, scales } = chart;
                    const xPos = scales.x.getPixelForValue(now);

                    if (xPos >= chartArea.left && xPos <= chartArea.right) {
                        ctx.save();
                        ctx.beginPath();
                        ctx.setLineDash([6, 4]);
                        ctx.strokeStyle = '#fbbf24';
                        ctx.lineWidth = 2;
                        ctx.moveTo(xPos, chartArea.top);
                        ctx.lineTo(xPos, chartArea.bottom);
                        ctx.stroke();

                        ctx.fillStyle = '#fbbf24';
                        ctx.font = `bold ${getScaledFont(12)}px sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.fillText('NOW', xPos, chartArea.top - 6);
                        ctx.restore();
                    }
                }
            };

            // Custom plugin to draw colored fill segments under the line
            const coloredFillPlugin = {
                id: 'coloredFill',
                beforeDatasetDraw(chartInstance, args) {
                    if (args.index !== 0) return;
                    const { ctx, chartArea, scales } = chartInstance;
                    const meta = chartInstance.getDatasetMeta(0);
                    const points = meta.data;
                    if (points.length < 2) return;

                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(chartArea.left, chartArea.top, chartArea.right - chartArea.left, chartArea.bottom - chartArea.top);
                    ctx.clip();

                    const yBottom = chartArea.bottom;

                    for (let i = 0; i < points.length - 1; i++) {
                        const p0 = points[i];
                        const p1 = points[i + 1];
                        if (p0.skip || p1.skip) continue;

                        const rating = ratings[i + 1] || ratings[i];
                        let color;
                        if (rating === 'bad') color = COLOR_BAD.fill;
                        else if (rating === 'moderate') color = COLOR_MODERATE.fill;
                        else color = COLOR_GOOD.fill;

                        ctx.beginPath();
                        ctx.moveTo(p0.x, p0.y);
                        // Approximate the curve with the bezier control points
                        if (p0.cp2 && p1.cp1) {
                            ctx.bezierCurveTo(p0.cp2.x, p0.cp2.y, p1.cp1.x, p1.cp1.y, p1.x, p1.y);
                        } else {
                            ctx.lineTo(p1.x, p1.y);
                        }
                        ctx.lineTo(p1.x, yBottom);
                        ctx.lineTo(p0.x, yBottom);
                        ctx.closePath();
                        ctx.fillStyle = color;
                        ctx.fill();
                    }
                    ctx.restore();
                }
            };

            if (chart) chart.destroy();

            // Compute Y range
            const validPressures = pressures.filter(p => p !== null);
            const minP = Math.min(...validPressures);
            const maxP = Math.max(...validPressures);
            const padding = Math.max((maxP - minP) * 0.15, 2);

            // Default visible window: 3 days back, 3 days forward from now
            const defaultMin = new Date(now.getTime() - DEFAULT_VIEW_DAYS_BACK * 24 * 60 * 60 * 1000);
            const defaultMax = new Date(now.getTime() + DEFAULT_VIEW_DAYS_FORWARD * 24 * 60 * 60 * 1000);
            // Absolute limits: full data range
            const absMin = times[0];
            const absMax = times[times.length - 1];

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: times,
                    datasets: [{
                        label: `Pressure in ${currentCity.name} (hPa)`,
                        data: pressures,
                        segment: {
                            borderColor: getSegmentColor(ratings),
                        },
                        borderColor: COLOR_GOOD.line,
                        borderWidth: 3,
                        pointRadius: 0,
                        pointHoverRadius: 5,
                        pointHoverBackgroundColor: '#f8fafc',
                        fill: false,
                        tension: 0.3,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: {
                            top: getScaledFont(13) + 20,
                        }
                    },
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            display: false,
                        },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            borderColor: '#475569',
                            borderWidth: 1,
                            titleColor: '#f8fafc',
                            bodyColor: '#e2e8f0',
                            titleFont: { size: getScaledFont(13) },
                            bodyFont: { size: getScaledFont(13) },
                            padding: 12,
                            callbacks: {
                                title: (items) => {
                                    const d = new Date(items[0].parsed.x);
                                    return d.toLocaleDateString('en-US', {
                                        weekday: 'short', month: 'short', day: 'numeric',
                                        hour: 'numeric', minute: '2-digit'
                                    });
                                },
                                label: (item) => {
                                    const val = item.parsed.y;
                                    const idx = item.dataIndex;
                                    let changeStr = '';
                                    if (idx >= 3 && pressures[idx] !== null && pressures[idx - 3] !== null) {
                                        const change = pressures[idx] - pressures[idx - 3];
                                        const arrow = change >= 0 ? '\u2191' : '\u2193';
                                        changeStr = `  (${arrow} ${Math.abs(change).toFixed(1)} over 3h)`;
                                    }
                                    const rating = ratings[idx];
                                    const ratingLabel = rating === 'bad' ? ' \u26a0\ufe0f' : rating === 'moderate' ? ' \u25b2' : '';
                                    return `${val.toFixed(1)} hPa${changeStr}${ratingLabel}`;
                                }
                            }
                        },
                        zoom: {
                            pan: {
                                enabled: true,
                                mode: 'x',
                                modifierKey: null,
                            },
                            zoom: {
                                wheel: { enabled: true },
                                pinch: { enabled: true },
                                mode: 'x',
                                onZoomComplete: ({ chart }) => {
                                    // Update Y range to fit visible data
                                    autoScaleY(chart, pressures, times);
                                },
                            },
                            limits: {
                                x: {
                                    min: absMin.getTime(),
                                    max: absMax.getTime(),
                                    minRange: 6 * 60 * 60 * 1000,  // Minimum 6 hours visible
                                },
                            },
                        },
                    },
                    scales: {
                        x: {
                            type: 'time',
                            min: defaultMin,
                            max: defaultMax,
                            time: {
                                displayFormats: {
                                    hour: 'EEE ha',
                                    day: 'EEE',
                                },
                                tooltipFormat: 'PPpp',
                            },
                            grid: { color: 'rgba(148, 163, 184, 0.06)' },
                            ticks: {
                                color: '#94a3b8',
                                maxTicksLimit: 12,
                                font: { size: getScaledFont(12), weight: 'bold' },
                            },
                        },
                        y: {
                            min: Math.floor(minP - padding),
                            max: Math.ceil(maxP + padding),
                            grid: { color: 'rgba(148, 163, 184, 0.08)' },
                            ticks: {
                                color: '#64748b',
                                font: { size: getScaledFont(13) },
                                callback: (val) => `${val} hPa`,
                            },
                            title: {
                                display: true,
                                text: 'Surface Pressure (hPa)',
                                color: '#94a3b8',
                                font: { size: getScaledFont(14) },
                            }
                        }
                    }
                },
                plugins: [dayBandsBgPlugin, coloredFillPlugin, nowLinePlugin, dayLabelsPlugin],
            });

            // Double-tap to reset zoom (single finger only — ignore pinch releases)
            let lastTap = 0;
            let wasPinching = false;

            chart.canvas.addEventListener('touchstart', (e) => {
                // Track if this is a multi-finger gesture
                if (e.touches.length > 1) {
                    wasPinching = true;
                }
            });

            chart.canvas.addEventListener('touchend', (e) => {
                // If we were pinching, ignore touchend until all fingers are up
                if (wasPinching) {
                    if (e.touches.length === 0) {
                        wasPinching = false;  // Reset after all fingers lifted
                    }
                    return;  // Don't treat pinch release as a tap
                }

                // Only count single-finger taps
                if (e.changedTouches.length === 1 && e.touches.length === 0) {
                    const now = Date.now();
                    if (now - lastTap < 300) {
                        chart.resetZoom('default');
                        lastTap = 0;  // Prevent triple-tap triggering again
                    } else {
                        lastTap = now;
                    }
                }
            });

            // Double-click to reset zoom (desktop)
            chart.canvas.addEventListener('dblclick', () => {
                chart.resetZoom('default');
            });
        }

        // Auto-scale Y axis to fit visible data after zoom/pan
        function autoScaleY(chartInstance, allPressures, allTimes) {
            const xScale = chartInstance.scales.x;
            const visMin = xScale.min;
            const visMax = xScale.max;

            let minP = Infinity, maxP = -Infinity;
            for (let i = 0; i < allTimes.length; i++) {
                const t = allTimes[i].getTime();
                if (t >= visMin && t <= visMax && allPressures[i] !== null) {
                    if (allPressures[i] < minP) minP = allPressures[i];
                    if (allPressures[i] > maxP) maxP = allPressures[i];
                }
            }

            if (minP !== Infinity) {
                const pad = Math.max((maxP - minP) * 0.15, 2);
                chartInstance.options.scales.y.min = Math.floor(minP - pad);
                chartInstance.options.scales.y.max = Math.ceil(maxP + pad);
                chartInstance.update('none');
            }
        }

        function updateStatus(data) {
            const times = data.times.map(t => new Date(t));
            const pressures = data.pressures;
            const now = new Date();

            // Find closest index to "now"
            let nowIdx = 0;
            let minDiff = Infinity;
            times.forEach((t, i) => {
                const diff = Math.abs(t - now);
                if (diff < minDiff) { minDiff = diff; nowIdx = i; }
            });

            // Current pressure
            const currentP = pressures[nowIdx];
            const currentEl = document.getElementById('currentPressure');
            if (currentP !== null) {
                currentEl.textContent = currentP.toFixed(1);
            }

            // 24h change (look back 24 hours = 24 indices)
            const change24El = document.getElementById('change24h');
            const idx24hAgo = nowIdx - 24;
            if (idx24hAgo >= 0 && pressures[idx24hAgo] !== null && currentP !== null) {
                const change = currentP - pressures[idx24hAgo];
                change24El.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(1)}`;
                change24El.className = `value ${change < -3 ? 'drop' : change > 3 ? 'rise' : 'neutral'}`;
            }

            // Max drop in next 24 hours
            const maxDropEl = document.getElementById('maxDrop');
            let maxDropVal = 0;
            const end24h = Math.min(nowIdx + 24, pressures.length - 1);
            if (currentP !== null) {
                for (let i = nowIdx + 1; i <= end24h; i++) {
                    if (pressures[i] !== null) {
                        const drop = pressures[i] - currentP;
                        if (drop < maxDropVal) maxDropVal = drop;
                    }
                }
            }
            maxDropEl.textContent = maxDropVal < 0 ? maxDropVal.toFixed(1) : 'None';
            maxDropEl.className = `value ${maxDropVal < -4 ? 'drop' : maxDropVal < -2 ? 'drop' : 'neutral'}`;

            // Trend (next 6 hours)
            const trendEl = document.getElementById('trend');
            const trendDetailEl = document.getElementById('trendDetail');
            const idx6h = Math.min(nowIdx + 6, pressures.length - 1);
            if (currentP !== null && pressures[idx6h] !== null) {
                const trend = pressures[idx6h] - currentP;
                if (trend < -2) {
                    trendEl.textContent = 'Dropping';
                    trendEl.className = 'value drop';
                    trendDetailEl.textContent = `${trend.toFixed(1)} hPa in 6h`;
                } else if (trend < -0.5) {
                    trendEl.textContent = 'Slight Drop';
                    trendEl.className = 'value drop';
                    trendDetailEl.textContent = `${trend.toFixed(1)} hPa in 6h`;
                } else if (trend > 2) {
                    trendEl.textContent = 'Rising';
                    trendEl.className = 'value rise';
                    trendDetailEl.textContent = `+${trend.toFixed(1)} hPa in 6h`;
                } else if (trend > 0.5) {
                    trendEl.textContent = 'Slight Rise';
                    trendEl.className = 'value rise';
                    trendDetailEl.textContent = `+${trend.toFixed(1)} hPa in 6h`;
                } else {
                    trendEl.textContent = 'Stable';
                    trendEl.className = 'value neutral';
                    trendDetailEl.textContent = 'Little change expected';
                }
            }

            // Alert banner
            if (maxDropVal < -4) {
                alertBanner.className = 'alert-banner warning';
                alertBanner.innerHTML = `&#9888; Significant pressure drop of ${maxDropVal.toFixed(1)} hPa expected in the next 24 hours &mdash; migraine risk is elevated`;
                alertBanner.style.display = 'block';
            } else if (maxDropVal < -2) {
                alertBanner.className = 'alert-banner warning';
                alertBanner.innerHTML = `&#9888; Moderate pressure drop of ${maxDropVal.toFixed(1)} hPa expected in the next 24 hours`;
                alertBanner.style.display = 'block';
            } else {
                alertBanner.className = 'alert-banner ok';
                alertBanner.innerHTML = '&#10003; Pressure looks stable &mdash; low migraine risk from barometric changes';
                alertBanner.style.display = 'block';
            }
        }

        // --- Init ---
        loadData();

        // --- Service Worker Registration ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then((reg) => {
                console.log('Service worker registered', reg.scope);
            }).catch((err) => {
                console.warn('SW registration failed:', err);
            });
        }
    </script>
</body>
</html>
