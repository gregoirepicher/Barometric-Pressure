<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Pressure line graph -->
  <polyline points="80,320 140,300 200,260 240,200 280,280 340,340 400,300 440,280"
    fill="none" stroke="url(#line)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Barometer circle -->
  <circle cx="256" cy="150" r="50" fill="none" stroke="#94a3b8" stroke-width="6"/>
  <line x1="256" y1="150" x2="280" y2="120" stroke="#f8fafc" stroke-width="6" stroke-linecap="round"/>
  <!-- "B" label -->
  <text x="256" y="420" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="72" fill="#94a3b8">BP</text>
</svg>
